{# AquilAdmin — Sidebar Navigation #}
<aside class="admin-sidebar">
    <div class="sidebar-brand">
        <img src="/static/logo.png" alt="Aquilia" style="width: 28px; height: 28px; object-fit: contain;">
        <h1>{{ site_title|default('Aquilia Admin') }}</h1>
        <span class="badge">v1.0</span>
    </div>
    <nav class="sidebar-nav">
        <a href="{{ url_prefix|default('/admin') }}/" class="nav-item {{ 'active' if not active_model else '' }}">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span><span>Dashboard</span>
        </a>
        <a href="{{ url_prefix|default('/admin') }}/audit/" class="nav-item {{ 'active' if active_model == '_audit' else '' }}">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span><span>Audit Log</span>
        </a>
        <div style="margin-top: 8px"></div>
        {% for app in app_list %}
        <div class="nav-section">{{ app.app_name }}</div>
        {% for model in app.models %}
        <a href="{{ url_prefix|default('/admin') }}/{{ model.url_name }}/"
           class="nav-item {{ 'active' if active_model == model.model_name|lower else '' }}">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span>
            <span>{{ model.name_plural }}</span>
        </a>
        {% endfor %}
        {% endfor %}
    </nav>
    <div style="padding: 16px 24px; border-top: 1px solid var(--border-color);">
        <a href="{{ url_prefix|default('/admin') }}/logout" class="btn btn-ghost" style="width:100%; justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </a>
    </div>
</aside>
