{# AquilAdmin — Sidebar Navigation #}
<aside class="admin-sidebar">
    <div class="sidebar-brand">
        <h1>🦅 {{ site_title|default('Aquilia Admin') }}</h1>
        <span class="badge">v1.0</span>
    </div>
    <nav class="sidebar-nav">
        <a href="{{ url_prefix|default('/admin') }}/" class="nav-item {{ 'active' if not active_model else '' }}">
            <span class="icon">📊</span><span>Dashboard</span>
        </a>
        <a href="{{ url_prefix|default('/admin') }}/audit/" class="nav-item {{ 'active' if active_model == '_audit' else '' }}">
            <span class="icon">📝</span><span>Audit Log</span>
        </a>
        <div style="margin-top: 8px"></div>
        {% for app in app_list %}
        <div class="nav-section">{{ app.app_name }}</div>
        {% for model in app.models %}
        <a href="{{ url_prefix|default('/admin') }}/{{ model.url_name }}/"
           class="nav-item {{ 'active' if active_model == model.model_name|lower else '' }}">
            <span class="icon">{{ model.icon|default('📋') }}</span>
            <span>{{ model.name_plural }}</span>
        </a>
        {% endfor %}
        {% endfor %}
    </nav>
    <div style="padding: 16px 24px; border-top: 1px solid var(--border-color);">
        <a href="{{ url_prefix|default('/admin') }}/logout" class="btn btn-ghost" style="width:100%; justify-content:center;">
            🚪 Logout
        </a>
    </div>
</aside>
