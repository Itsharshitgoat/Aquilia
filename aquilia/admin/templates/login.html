{# AquilAdmin — Login Page #}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to the Aquilia Admin dashboard.">
    <meta name="author" content="Aquilia Framework">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#22c55e">
    <meta name="color-scheme" content="dark light">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Login — {{ site_title|default('Aquilia Admin') }}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>{% include "partials/css.html" %}</style>
</head>
<body>
    <div class="login-container">
        <div class="card login-card">
            <div class="login-logo">
                <div style="margin-bottom: 12px;">
                    <img src="/static/logo.png" alt="Aquilia" style="width: 64px; height: 64px; object-fit: contain;">
                </div>
                <h1 class="gradient-text">{{ site_title|default('Aquilia Admin') }}</h1>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 8px;">
                    Sign in to access the admin dashboard
                </p>
            </div>
            {% if error %}
            <div class="flash flash-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_prefix|default('/admin') }}/login">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 8px;">
                    Sign In
                </button>
            </form>
        </div>
    </div>
    <script>
        var saved = localStorage.getItem('aquilia-admin-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    </script>
</body>
</html>
