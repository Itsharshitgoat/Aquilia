<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default('dark') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aquilia Admin — manage your application data, users, and configuration.">
    <meta name="author" content="Aquilia Framework">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#22c55e">
    <meta name="color-scheme" content="dark light">
    <meta property="og:title" content="{% block og_title %}{{ site_title|default('Aquilia Admin') }}{% endblock %}">
    <meta property="og:description" content="Aquilia Admin — manage your application data, users, and configuration.">
    <meta property="og:type" content="website">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>{% block title %}Dashboard{% endblock %} — {{ site_title|default('Aquilia Admin') }}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
    {% block head_css %}
    {% include "partials/css.html" %}
    {% endblock %}
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="admin-layout">
        {% block sidebar %}
        {% include "partials/sidebar.html" %}
        {% endblock %}

        <div class="admin-main">
            {% block topbar %}
            {% include "partials/topbar.html" %}
            {% endblock %}

            <div class="admin-content">
                {% if flash %}
                <div class="flash flash-{{ flash_type|default('success') }}">{{ flash }}</div>
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script>
    {% block base_js %}
    // Theme toggle
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('aquilia-admin-theme', next);
    }
    // Restore saved theme
    (function() {
        const saved = localStorage.getItem('aquilia-admin-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
    // Select-all checkbox
    function toggleAll(source) {
        document.querySelectorAll('.row-check').forEach(function(cb) {
            cb.checked = source.checked;
        });
    }
    {% endblock %}
    {% block extra_js %}{% endblock %}
    </script>
</body>
</html>
