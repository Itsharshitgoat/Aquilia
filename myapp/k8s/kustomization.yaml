apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: myapp

labels:
  - pairs:
      app.kubernetes.io/name: myapp
      app.kubernetes.io/managed-by: aquilia-cli

resources:
  - 00-namespace.yaml
  - 01-service-account.yaml
  - 02-configmap.yaml
  - 03-secret.yaml
  - 04-pvc.yaml
  - 05-deployment.yaml
  - 06-service.yaml
  - 07-ingress.yaml
  - 08-hpa.yaml
  - 09-pdb.yaml
  - 10-network-policy.yaml
  - 11-cronjob.yaml
