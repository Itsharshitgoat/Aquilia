apiVersion: v1
kind: Secret
metadata:
  name: myapp-secrets
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # Base64-encode your values: echo -n "value" | base64
  AQ_SECRET_KEY: "CHANGEME_BASE64_ENCODED"
  DATABASE_URL: "CHANGEME_BASE64_ENCODED"
  REDIS_URL: "CHANGEME_BASE64_ENCODED"
