apiVersion: v1
kind: Service
metadata:
  name: myapp-app
  namespace: myapp
  labels:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: myapp
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
